# 开发环境配置（敏感信息通过环境变量注入）

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/game?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:root}
  redis:
    host: localhost
    port: 6379
    password: ${REDIS_PASSWORD:}

wx:
  miniapp:
    appid: ${WX_MINIAPP_APPID:}
    secret: ${WX_MINIAPP_SECRET:}

dy:
  miniapp:
    appid: ${DY_MINIAPP_APPID:}
    secret: ${DY_MINIAPP_SECRET:}
