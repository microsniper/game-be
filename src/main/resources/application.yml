spring:
  application:
    name: game-be
  
  # MySQL 配置
  datasource:
    url: jdbc:mysql://${DB_HOST:39.105.174.212}:${DB_PORT:3300}/${DB_NAME:game}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: WordGameHikariPool

  # Redis 配置
  redis:
    host: ${REDIS_HOST:39.105.174.212}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 16
        max-wait: -1ms
        max-idle: 8
        min-idle: 2

server:
  port: 9001

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sniper.game.wordgame.entity
  configuration:
    map-underscore-to-camel-case: true

wx:
  miniapp:
    appid: ${WX_MINIAPP_APPID:}
    secret: ${WX_MINIAPP_SECRET:}
    jscode2session-url: ${WX_MINIAPP_JSCODE2SESSION_URL:https://api.weixin.qq.com/sns/jscode2session?appid=%s&secret=%s&js_code=%s&grant_type=authorization_code}
